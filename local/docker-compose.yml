version: "3.9"

services:

  backend:
    image: prestadores-back:local
    container_name: prestadores-back
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5433/curso_sq15
      DB_USER: sq15
      DB_PASSWORD: secret

  frontend:
    image: prestadores-front:local
    container_name: prestadores-front
    ports:
      - "5173:80"
    depends_on:
      - backend